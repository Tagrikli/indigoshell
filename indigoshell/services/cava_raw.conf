; Cava config used by IndigoBar's beat detector. Writes raw 16-bit
; unsigned band magnitudes to stdout for in-process consumption — not
; meant to be run by the user directly.

[general]
bars = 20
framerate = 60
autosens = 1
overshoot = 0
sensitivity = 100
lower_cutoff_freq = 30
higher_cutoff_freq = 16000

[input]
method = pulse
source = auto

[output]
method = raw
raw_target = /dev/stdout
data_format = binary
bit_format = 16bit
channels = mono

[smoothing]
noise_reduction = 0.77
